name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # libudev is required by the `serialport` crate; no webview deps needed.
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint (ESLint — React Rules of Hooks)
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vite build
        run: npm run build

  e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  firmware-compile:
    name: PlatformIO firmware compile
    runs-on: ubuntu-22.04
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # libudev is required by the `serialport` crate to compile the crate.
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('src-tauri/templates/platformio.ini.jinja2') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile generated firmware
        run: cargo test --manifest-path src-tauri/Cargo.toml --test pio_compile
        env:
          PIO_BIN: pio
