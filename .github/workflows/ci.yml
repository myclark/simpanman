name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "server -> target"

      - name: Cargo check
        run: cargo check --manifest-path server/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path server/Cargo.toml -- -D warnings

      - name: Tests
        run: cargo test --manifest-path server/Cargo.toml

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint (ESLint — React Rules of Hooks)
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vite build
        run: npm run build

  e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
