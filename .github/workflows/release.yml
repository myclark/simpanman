name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            pio_suffix: windows-x86_64.exe
            helper_bin: simpanman-helper.exe
            pio_name: pio.exe
          - platform: ubuntu-22.04
            pio_suffix: linux-x86_64
            helper_bin: simpanman-helper
            pio_name: pio
          - platform: macos-latest
            pio_suffix: macos-arm64
            helper_bin: simpanman-helper
            pio_name: pio

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "helper -> target"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux system deps
        if: startsWith(matrix.platform, 'ubuntu')
        # libudev is required by the `serialport` crate.
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install frontend deps
        run: npm ci

      - name: Build renderer + Electron main/preload
        run: |
          npm run build:renderer
          npm run build:electron

      - name: Build native helper
        run: cargo build --release --manifest-path helper/Cargo.toml

      # Stage the per-platform native binaries for electron-builder extraResources
      # (electron-builder.yml copies build/bin → resources/helper in the package).
      - name: Stage helper binary
        shell: bash
        run: |
          mkdir -p build/bin
          cp "helper/target/release/${{ matrix.helper_bin }}" "build/bin/"

      - name: Download PlatformIO
        shell: bash
        run: |
          PIO_VERSION="6.1.16"
          URL="https://github.com/platformio/platformio-core-installer/releases/download/${PIO_VERSION}/pioinstaller-${PIO_VERSION}-${{ matrix.pio_suffix }}"
          echo "Downloading ${URL}"
          curl -fsSL "$URL" -o "build/bin/${{ matrix.pio_name }}"
          [[ "${{ matrix.platform }}" != "windows-latest" ]] && chmod +x "build/bin/${{ matrix.pio_name }}" || true

      - name: Build & publish installers
        # electron-builder attaches installers + the latest*.yml update feeds to
        # the GitHub Release matching this tag (consumed by electron-updater).
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
